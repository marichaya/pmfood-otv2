<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>P.M Food – ตารางแจ้งสายรถ</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<style>
@import url('https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700&display=swap');
*{margin:0;padding:0;box-sizing:border-box;font-family:'Sarabun',sans-serif}
body{background:#f8fafc}
thead th{background:#1e3a5f;color:#fff;padding:10px 14px;font-size:13px;font-weight:600;position:sticky;top:0;z-index:5}
tbody tr{border-top:1px solid #f1f5f9;transition:background .15s}
tbody td{padding:9px 14px;font-size:14px}
tfoot td{padding:10px 14px;background:#f8fafc;border-top:2px solid #e2e8f0;font-weight:700}
.cbtn{width:28px;height:28px;border-radius:50%;border:2.5px solid transparent;cursor:pointer;transition:all .18s;display:inline-flex;align-items:center;justify-content:center;flex-shrink:0}
.cbtn:hover{transform:scale(1.2);border-color:#94a3b8}
.cbtn.on{border-color:#1e3a5f!important;transform:scale(1.3);box-shadow:0 2px 10px rgba(0,0,0,.3)}
.note{background:transparent;border:none;border-bottom:1.5px dashed #cbd5e1;width:100%;font-size:13px;padding:3px 4px;outline:none;transition:all .2s;font-family:inherit}
.note:focus{border-bottom:2px solid #3b82f6;background:#eff6ff;border-radius:4px 4px 0 0}
.btn{display:inline-flex;align-items:center;gap:6px;padding:9px 18px;border-radius:10px;font-size:14px;font-weight:600;border:none;cursor:pointer;transition:all .2s;font-family:inherit}
</style>
</head>
<body>
<script src="/js/app.js"></script>
<script>
const ROW_BG={none:'',green:'#dcfce7',red:'#fee2e2',yellow:'#fef9c3',blue:'#dbeafe'};
let noteTimers={}, curDate='';

(async()=>{
  if(!await App.init('ตารางแจ้งสายรถ','จัดการสายรถรับ-ส่ง พร้อมระบบสี')) return;
  renderPage();
  curDate=App.getDate();
  loadBus(curDate);
  window._onDateChange=d=>{curDate=d;loadBus(d);};
})();

function renderPage(){
  document.getElementById('pageContent').innerHTML=`
    <div style="background:#fff;border-radius:16px;border:1px solid #f1f5f9;padding:14px 20px;margin-bottom:16px;display:flex;flex-wrap:wrap;align-items:center;gap:16px">
      <span style="font-weight:600;color:#374151;font-size:14px">ตำนานสี:</span>
      <span style="display:flex;align-items:center;gap:6px;font-size:13px"><span style="width:18px;height:18px;background:#dcfce7;border:1px solid #86efac;border-radius:4px;display:inline-block"></span>เลิก 16:00</span>
      <span style="display:flex;align-items:center;gap:6px;font-size:13px"><span style="width:18px;height:18px;background:#fee2e2;border:1px solid #fca5a5;border-radius:4px;display:inline-block"></span>เลิก 19:00 (OT)</span>
      <span style="display:flex;align-items:center;gap:6px;font-size:13px"><span style="width:18px;height:18px;background:#fef9c3;border:1px solid #fde047;border-radius:4px;display:inline-block"></span>รวมสาย 16+19</span>
      <span style="display:flex;align-items:center;gap:6px;font-size:13px"><span style="width:18px;height:18px;background:#dbeafe;border:1px solid #93c5fd;border-radius:4px;display:inline-block"></span>เข้ากะดึก</span>
      <button class="btn" onclick="saveAll()" style="margin-left:auto;background:#1d4ed8;color:#fff">
        <i class="fas fa-floppy-disk"></i> บันทึกทั้งหมด</button>
    </div>
    <div style="background:#fff;border-radius:16px;border:1px solid #f1f5f9;overflow:hidden;box-shadow:0 1px 4px rgba(0,0,0,.05)">
      <div style="background:linear-gradient(90deg,#1e3a5f,#1e40af);padding:16px 24px;display:flex;justify-content:space-between;align-items:center">
        <h3 style="color:#fff;font-size:18px;font-weight:700;display:flex;align-items:center;gap:8px">
          <i class="fas fa-bus" style="color:#93c5fd"></i> สายรถรับ-ส่ง พนักงาน</h3>
        <span id="dtLbl" style="color:#93c5fd;font-size:13px"></span>
      </div>
      <div style="max-height:calc(100vh-280px);overflow-y:auto;overflow-x:auto">
        <table style="width:100%;min-width:800px;border-collapse:collapse">
          <thead><tr>
            <th style="text-align:left;min-width:170px">สายรถรับ-ส่ง</th>
            <th style="text-align:center;width:90px">จุดงาน</th>
            <th style="text-align:center;width:80px">07:00<br><span style="font-weight:400;font-size:11px;color:#93c5fd">จำนวนมา</span></th>
            <th style="text-align:center;width:80px;background:#1e3a8a">19:00<br><span style="font-weight:400;font-size:11px;color:#93c5fd">OT</span></th>
            <th style="text-align:center;width:80px">16:00<br><span style="font-weight:400;font-size:11px;color:#94a3b8">ไม่OT</span></th>
            <th style="text-align:left;min-width:150px">ปกติ/รวมสาย 16:00</th>
            <th style="text-align:left;min-width:150px">วิ่ง OT 19:00</th>
            <th style="text-align:center;width:150px">เปลี่ยนสีแถว</th>
          </tr></thead>
          <tbody id="busBody"><tr><td colspan="8" style="text-align:center;padding:40px;color:#94a3b8">
            <div style="width:28px;height:28px;border:3px solid #3b82f6;border-top-color:transparent;border-radius:50%;animation:sp .7s linear infinite;margin:0 auto 8px"></div>กำลังโหลด...
          </td></tr></tbody>
          <tfoot><tr>
            <td colspan="2">รวม</td>
            <td style="text-align:center" id="ftTot">0</td>
            <td style="text-align:center;color:#1d4ed8" id="ftOT">0</td>
            <td style="text-align:center;color:#64748b" id="ftNon">0</td>
            <td colspan="3"></td>
          </tr></tfoot>
        </table>
      </div>
      <div style="background:#f8fafc;border-top:1px solid #e2e8f0;padding:10px 20px;display:flex;flex-wrap:wrap;gap:16px;font-size:12px;color:#64748b">
        <span>🟢 เลิก 16:00: <strong id="cG" style="color:#16a34a">0</strong> สาย</span>
        <span>🔴 เลิก 19:00: <strong id="cR" style="color:#dc2626">0</strong> สาย</span>
        <span>🟡 รวมสาย: <strong id="cY" style="color:#ca8a04">0</strong> สาย</span>
        <span>🔵 กะดึก: <strong id="cB" style="color:#2563eb">0</strong> สาย</span>
      </div>
    </div>
    <style>@keyframes sp{to{transform:rotate(360deg)}}</style>`;
}

async function loadBus(date){
  const lbl=document.getElementById('dtLbl');
  if(lbl) lbl.textContent='ประจำวันที่ '+App.dateThLong(date);
  App.loading(true);
  try{
    const r=await fetch(`/api/ot/summary-bus?date=${date}`).then(r=>r.json());
    buildTable(r.data||[]);
  }catch(e){App.toast('โหลดข้อมูลไม่ได้','error');}
  finally{App.loading(false);}
}

function buildTable(rows){
  const tb=document.getElementById('busBody'); if(!tb) return;
  let tTot=0,tOT=0,tNon=0;
  rows.forEach(r=>{tTot+=Number(r.total_count);tOT+=Number(r.ot_total);tNon+=Number(r.non_ot_total);});
  tb.innerHTML='';
  rows.forEach(r=>{
    const tr=document.createElement('tr');
    tr.id=`br_${r.id}`; tr.dataset.id=r.id; tr.dataset.color=r.color_status||'none';
    tr.style.background=ROW_BG[r.color_status||'none']||'';
    tr.style.transition='background .25s';

    const label=r.route_number==='0'?'มาเอง':`สาย ${r.route_number} <span style="color:#94a3b8;font-weight:400">${r.route_name}</span>`;
    const otBadge=Number(r.ot_total)>0?`<span style="background:#dbeafe;color:#1d4ed8;padding:2px 8px;border-radius:99px;font-size:12px;font-weight:700">${r.ot_total}</span>`:`<span style="color:#cbd5e1">0</span>`;

    tr.innerHTML=`
      <td style="font-weight:500;color:#334155">${label}</td>
      <td style="text-align:center;font-size:12px;color:#94a3b8">${r.job_zone||''}</td>
      <td style="text-align:center;font-weight:600;color:#334155">${r.total_count||0}</td>
      <td style="text-align:center">${otBadge}</td>
      <td style="text-align:center;color:#94a3b8">${r.non_ot_total||0}</td>
      <td><input type="text" value="${(r.note_1600||'').replace(/"/g,'&quot;')}" placeholder="ปกติ/รวมสาย..." class="note n16"></td>
      <td><input type="text" value="${(r.note_1900||'').replace(/"/g,'&quot;')}" placeholder="วิ่ง OT 19:00..." class="note n19"></td>
      <td>
        <div style="display:flex;align-items:center;justify-content:center;gap:4px">
          <button class="cbtn ${(r.color_status||'none')==='none'?'on':''}" style="background:#fff;border-color:#e2e8f0" title="ล้างสี" data-c="none" data-id="${r.id}">
            <i class="fas fa-times" style="font-size:9px;color:#94a3b8"></i></button>
          <button class="cbtn ${r.color_status==='green'?'on':''}" style="background:#bbf7d0" title="เลิก 16:00" data-c="green" data-id="${r.id}"></button>
          <button class="cbtn ${r.color_status==='red'?'on':''}" style="background:#fecaca" title="เลิก 19:00 OT" data-c="red" data-id="${r.id}"></button>
          <button class="cbtn ${r.color_status==='yellow'?'on':''}" style="background:#fde68a" title="รวมสาย 16+19" data-c="yellow" data-id="${r.id}"></button>
          <button class="cbtn ${r.color_status==='blue'?'on':''}" style="background:#bfdbfe" title="เข้ากะดึก" data-c="blue" data-id="${r.id}"></button>
        </div>
      </td>`;

    // ผูก event ปุ่มสี — addEventListener (ไม่มี onclick string bug)
    tr.querySelectorAll('.cbtn').forEach(btn=>{
      btn.addEventListener('click',()=>{
        const color=btn.dataset.c;
        tr.style.background=ROW_BG[color]||'';
        tr.dataset.color=color;
        tr.querySelectorAll('.cbtn').forEach(b=>b.classList.remove('on'));
        btn.classList.add('on');
        updateCounts();
        saveRow(r.id);
      });
    });

    // note auto-save
    tr.querySelectorAll('.note').forEach(inp=>{
      inp.addEventListener('input',()=>{
        clearTimeout(noteTimers[r.id]);
        noteTimers[r.id]=setTimeout(()=>saveRow(r.id),1200);
      });
    });
    tb.appendChild(tr);
  });

  document.getElementById('ftTot').textContent=tTot;
  document.getElementById('ftOT').textContent=tOT;
  document.getElementById('ftNon').textContent=tNon;
  updateCounts();
}

function updateCounts(){
  const c={none:0,green:0,red:0,yellow:0,blue:0};
  document.querySelectorAll('#busBody tr[data-id]').forEach(tr=>{ c[tr.dataset.color||'none']++; });
  document.getElementById('cG').textContent=c.green;
  document.getElementById('cR').textContent=c.red;
  document.getElementById('cY').textContent=c.yellow;
  document.getElementById('cB').textContent=c.blue;
}

async function saveRow(routeId){
  const tr=document.getElementById(`br_${routeId}`); if(!tr) return;
  try{
    await fetch('/api/bus/schedule',{method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({date:curDate,bus_route_id:routeId,color_status:tr.dataset.color||'none',
        note_1600:tr.querySelector('.n16')?.value||'',note_1900:tr.querySelector('.n19')?.value||''})});
  }catch(e){}
}

async function saveAll(){
  const updates=[];
  document.querySelectorAll('#busBody tr[data-id]').forEach(tr=>{
    updates.push({bus_route_id:tr.dataset.id,color_status:tr.dataset.color||'none',
      note_1600:tr.querySelector('.n16')?.value||'',note_1900:tr.querySelector('.n19')?.value||''});
  });
  App.loading(true);
  try{
    const r=await fetch('/api/bus/schedule/bulk',{method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({date:curDate,updates})}).then(r=>r.json());
    if(r.success) App.toast('บันทึกทั้งหมดสำเร็จ ✓','success');
    else App.toast('บันทึกไม่สำเร็จ','error');
  }catch(e){App.toast('เกิดข้อผิดพลาด','error');}
  finally{App.loading(false);}
}
</script>
</body></html>
